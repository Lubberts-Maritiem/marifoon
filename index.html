<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lubberts Maritiem · VHF & Camera Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0d0f12;
  --panel:#141820;
  --rim:#1e2430;
  --steel:#262e3c;
  --accent:#e8a020;
  --accent2:#c8781a;
  --text:#b0bec5;
  --text-dim:#546e7a;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

header{
  width:100%;
  max-width:900px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.brand{
  font-family:'Cinzel',serif;
  font-size:14px;
  letter-spacing:4px;
  color:var(--accent);
  text-transform:uppercase;
}

.utc-clock{
  font-family:'Orbitron',monospace;
  color:var(--text-dim);
  font-size:14px;
}

.radio-body{
  width:100%;
  max-width:900px;
  background:var(--panel);
  border:1px solid var(--rim);
  border-radius:12px;
  padding:24px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  box-shadow:
    0 0 0 1px #0a0c10,
    0 8px 40px rgba(0,0,0,0.6);
}

.display-block{
  grid-column:1/-1;
  background:#080b0e;
  border-radius:8px;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.channel-display{
  display:flex;
  flex-direction:column;
}

.channel-label-small{
  font-size:10px;
  letter-spacing:4px;
  color:var(--text-dim);
  text-transform:uppercase;
  margin-bottom:4px;
}

.channel-number{
  font-family:'Orbitron',monospace;
  font-size:72px;
  font-weight:900;
  color:var(--accent);
  text-shadow:
    0 0 20px rgba(232,160,32,0.5);
}

.channel-name{
  font-size:13px;
  letter-spacing:2px;
  color:var(--text-dim);
  margin-top:6px;
  text-transform:uppercase;
}

.waveform-block{
  grid-column:1/-1;
  background:#060809;
  border-radius:6px;
  overflow:hidden;
  height:60px;
}

canvas{
  width:100%;
  height:60px;
  display:block;
}

.controls-left,
.controls-right{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.controls-right{
  align-items:flex-end;
}

.ctrl-label{
  font-size:10px;
  letter-spacing:3px;
  color:var(--text-dim);
  text-transform:uppercase;
  margin-bottom:8px;
}

.ch-arrows,
.preset-row{
  display:flex;
  gap:8px;
}

.btn{
  background:var(--steel);
  border:1px solid #2e3848;
  color:var(--text);
  border-radius:6px;
  padding:8px 16px;
  cursor:pointer;
  font-family:inherit;
  transition:0.15s;
}

.btn:hover{
  background:#2e3848;
  color:var(--accent);
}

.btn-arrow{
  font-size:18px;
}

.btn-preset.active{
  background:var(--accent2);
  color:black;
}

.volume-slider{
  width:140px;
}

.camera-container{
  grid-column:1/-1;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #0f1318;
  background:black;
}

.camera-video{
  width:100%;
  aspect-ratio:16/9;
  background:black;
}

.boot-overlay{
  position:fixed;
  inset:0;
  background:#060809;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  transition:opacity 0.5s;
}

.boot-overlay.hidden{
  opacity:0;
  pointer-events:none;
}

.boot-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.boot-brand{
  font-family:'Cinzel',serif;
  font-size:18px;
  letter-spacing:6px;
  color:var(--accent);
}

.boot-channel{
  font-family:'Orbitron',monospace;
  font-size:80px;
  color:var(--accent);
}

select{
  appearance:none;
}

audio{
  display:none;
}

</style>
</head>

<body>

<div class="boot-overlay" id="bootOverlay">

  <div class="boot-content">

    <div class="boot-brand">
      Lubberts Maritiem
    </div>

    <div class="boot-channel" id="bootCh">
      01
    </div>

    <div class="channel-name">
      VHF Marine Initializing
    </div>

  </div>

</div>

<header>

  <div class="brand">
    Lubberts Maritiem · VHF
  </div>

  <div class="utc-clock" id="utcClock">
    00:00:00 UTC
  </div>

</header>

<div class="radio-body">

  <div class="display-block">

    <div class="channel-display">

      <div class="channel-label-small">
        Kanaal
      </div>

      <div class="channel-number" id="chDisplay">
        02
      </div>

      <div class="channel-name" id="chName">
        HAVENVERKEER / PORT OPS
      </div>

    </div>

  </div>

  <div class="waveform-block">
    <canvas id="waveform"></canvas>
  </div>

  <div class="controls-left">

    <div>

      <div class="ctrl-label">
        Kanaal
      </div>

      <div class="ch-arrows">

        <button class="btn btn-arrow" onclick="changeChannel(1)">
          ▲
        </button>

        <button class="btn btn-arrow" onclick="changeChannel(-1)">
          ▼
        </button>

      </div>

    </div>

    <div>

      <div class="ctrl-label">
        Snelkies
      </div>

      <div class="preset-row">

        <button class="btn btn-preset" onclick="setChannel(16)">
          16
        </button>

        <button class="btn btn-preset" onclick="setChannel(9)">
          09
        </button>

        <button class="btn btn-preset" onclick="setChannel(67)">
          67
        </button>

        <button class="btn btn-preset" onclick="setChannel(70)">
          70
        </button>

        <button class="btn btn-preset active" onclick="setChannel(2)">
          02
        </button>

      </div>

    </div>

  </div>

  <div class="controls-right">

    <div>

      <div class="ctrl-label">
        Volume
      </div>

      <input
        type="range"
        min="0"
        max="100"
        value="80"
        class="volume-slider"
        id="volumeSlider">

    </div>

  </div>

</div>

<!-- CAMERA VIEWER -->

<div class="radio-body" style="margin-top:16px;">

  <div class="display-block">

    <div class="channel-display">

      <div class="channel-label-small">
        Camera Viewer
      </div>

      <div class="channel-number" style="font-size:42px;">
        LIVE
      </div>

      <div class="channel-name">
        Haven Camera Observatie
      </div>

    </div>

    <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">

      <label class="ctrl-label">
        Camera Selectie
      </label>

      <select
        id="cameraSelect"
        class="btn"
        onchange="switchCamera()">

        <option value="cam1">
          CAM1
        </option>

        <option value="cam2">
          CAM2
        </option>

      </select>

    </div>

  </div>

  <div class="camera-container">

    <video
      id="cameraPlayer"
      class="camera-video"
      controls
      autoplay
      muted
      playsinline>
    </video>

  </div>

</div>

<audio
  id="audioPlayer"
  preload="none"
  crossorigin="anonymous">
</audio>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const STREAM_URL =
'https://www.tbandsma.nl:8443/;';

const CAMERA_STREAMS = {

  cam1:
  'https://584b389d712f9.streamlock.net/live-cam/havenkom-ts/playlist.m3u8?wowzatokenendtime=1778523889&wowzatokenhash=q0vYSOilqvaYyLz1cLGlqF4kwgzOO2FPcQbyXhyMnm4=&wowzatokenstarttime=1778522029',

  cam2:
  'https://5b8d2cbe62ad6.streamlock.net/live/veerkade.stream/playlist.m3u8?wowzatokenendtime=1778525745&wowzatokenhash=I7xqmNNsEObakNLCs_EodQ471UgHSF1w1XbxDIvy_EE=&wowzatokenstarttime=1778522085'

};

const CH_LABELS = {

  2:'HAVENVERKEER / PORT OPS',
  9:'HAVENCOÖRDINATIE',
  16:'INTL NOODKANAAL',
  67:'HAVENVERKEER (NL)',
  70:'DSC NOODOPROEP'

};

let currentChannel = 2;

const audioPlayer =
document.getElementById('audioPlayer');

const volumeSlider =
document.getElementById('volumeSlider');

const chDisplay =
document.getElementById('chDisplay');

const chName =
document.getElementById('chName');

function renderChannel(ch){

  chDisplay.textContent =
  String(ch).padStart(2,'0');

  chName.textContent =
  CH_LABELS[ch] || 'VHF MARINE KANAAL';

  document.querySelectorAll('.btn-preset')
  .forEach(btn=>{

    btn.classList.toggle(
      'active',
      parseInt(btn.textContent) === ch
    );

  });

}

function setChannel(ch){

  currentChannel = ch;

  renderChannel(ch);

}

function changeChannel(dir){

  currentChannel += dir;

  if(currentChannel < 1){
    currentChannel = 88;
  }

  if(currentChannel > 88){
    currentChannel = 1;
  }

  renderChannel(currentChannel);

}

function updateClock(){

  const now = new Date();

  const hh =
  String(now.getUTCHours())
  .padStart(2,'0');

  const mm =
  String(now.getUTCMinutes())
  .padStart(2,'0');

  const ss =
  String(now.getUTCSeconds())
  .padStart(2,'0');

  document.getElementById('utcClock')
  .textContent =
  `${hh}:${mm}:${ss} UTC`;

}

setInterval(updateClock,1000);

updateClock();

volumeSlider.addEventListener('input',()=>{

  audioPlayer.volume =
  volumeSlider.value / 100;

});

audioPlayer.src = STREAM_URL;

audioPlayer.volume = 0.8;

audioPlayer.addEventListener('error',(e)=>{

  console.error(
    'Audio stream fout:',
    e
  );

});

audioPlayer.play().catch(err=>{

  console.log(
    'Autoplay geblokkeerd:',
    err
  );

  document.addEventListener('click',()=>{

    audioPlayer.play();

  },{once:true});

});

const canvas =
document.getElementById('waveform');

const ctx =
canvas.getContext('2d');

function resizeCanvas(){

  canvas.width =
  canvas.offsetWidth;

  canvas.height =
  canvas.offsetHeight;

}

window.addEventListener(
  'resize',
  resizeCanvas
);

resizeCanvas();

function animateWave(){

  requestAnimationFrame(
    animateWave
  );

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.beginPath();

  ctx.strokeStyle =
  'rgba(232,160,32,0.8)';

  for(let x=0;x<canvas.width;x++){

    const y =
    canvas.height/2 +
    Math.sin(
      x*0.02 +
      Date.now()*0.01
    ) * 10;

    if(x===0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }

  }

  ctx.stroke();

}

animateWave();

(function boot(){

  const overlay =
  document.getElementById(
    'bootOverlay'
  );

  const bootCh =
  document.getElementById(
    'bootCh'
  );

  let n = 1;

  const iv = setInterval(()=>{

    bootCh.textContent =
    String(n).padStart(2,'0');

    n++;

    if(n>16){

      clearInterval(iv);

      setTimeout(()=>{

        overlay.classList.add(
          'hidden'
        );

      },700);

    }

  },80);

})();

function switchCamera(){

  const video =
  document.getElementById(
    'cameraPlayer'
  );

  const selected =
  document.getElementById(
    'cameraSelect'
  ).value;

  const url =
  CAMERA_STREAMS[selected];

  if(window.currentHls){

    window.currentHls.destroy();

  }

  if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);

    window.currentHls = hls;

  }else if(
    video.canPlayType(
      'application/vnd.apple.mpegurl'
    )
  ){

    video.src = url;

  }

}

switchCamera();

renderChannel(currentChannel);

</script>

</body>
</html>
